<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Healthcare AI Chatbot</h2>
            <button id="sos-btn" class="sos-btn">🚨 SOS Emergency</button>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hello! I am your healthcare assistant. Please tell me your symptoms (e.g., headache, fever, chest pain).
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your symptoms here..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='patient.js') }}"></script>
</body>
</html>
